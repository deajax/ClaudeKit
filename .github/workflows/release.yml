name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 版本号 (例如 0.2.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: v${{ inputs.version }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5

      - name: Bump version and create tag
        run: |
          VERSION="${VERSION_INPUT#v}"
          TAG="v$VERSION"
          npm version "$VERSION" --no-git-tag-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to $TAG"
          git tag "$TAG"
          git push origin "$TAG" --force
        env:
          VERSION_INPUT: ${{ inputs.version }}

  build:
    needs: tag
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CSC_IDENTITY_AUTO_DISCOVERY: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.tag.outputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2

      - name: Rebuild native modules for Electron
        run: npm run rebuild

      - name: Build frontend + main
        run: npm run build

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --config --publish never --x64 --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --config --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup — keep only installers
        run: |
          find release -type f ! -name '*.dmg' ! -name '*Setup*.exe' -delete
          find release -type d -empty -delete
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ClaudeKit-${{ needs.tag.outputs.tag }}-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*Setup*.exe

  release:
    needs: [tag, build]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          name: ClaudeKit ${{ needs.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*Setup*.exe

      - uses: actions/checkout@v5
        with:
          ref: gh-pages

      - name: Update gh-pages download links
        env:
          V: ${{ inputs.version }}
        run: |
          git checkout -B gh-pages origin/gh-pages
          OLD=$(grep -oP 'releases/download/v\K[^/]+' index.html | head -1)
          [ -z "$OLD" ] && { echo "ERROR: no version found in index.html"; exit 1; }
          echo "v${OLD} → v${V}"
          sed -i "s|releases/download/v${OLD}|releases/download/v${V}|g" index.html
          sed -i "s|ClaudeKit-${OLD}|ClaudeKit-${V}|g" index.html
          sed -i "s|ClaudeKit.Setup.${OLD}|ClaudeKit.Setup.${V}|g" index.html
          sed -i "s|v${OLD} ·|v${V} ·|g" index.html
          git add index.html
          git diff --cached --quiet || {
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: update download links to v$V"
            git push origin gh-pages
          }
