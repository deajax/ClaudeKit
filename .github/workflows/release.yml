name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.read-version.outputs.tag }}
      version: ${{ steps.read-version.outputs.version }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5

      - id: read-version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          TAG="${{ steps.read-version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag --force "$TAG"
          git push origin "$TAG" --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: tag
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CSC_IDENTITY_AUTO_DISCOVERY: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.tag.outputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Setup MSVC dev environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Rebuild native modules for Electron
        run: npm run rebuild

      - name: Build frontend + main
        run: npm run build

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --config --publish never --x64 --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --config --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup — keep only installers
        run: |
          find release -type f ! -name '*.dmg' ! -name '*Setup*.exe' -delete
          find release -type d -empty -delete
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ClaudeKit-${{ needs.tag.outputs.tag }}-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*Setup*.exe

  release:
    needs: [tag, build]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.tag.outputs.tag }}

      - name: Extract changelog entry
        run: |
          awk '/^## v/{if(i)exit;i=1;next}i' CHANGELOG.md | sed '/^$/d' > release_body.md
          echo "body_file=release_body.md" >> "$GITHUB_OUTPUT"
        id: changelog

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          name: ClaudeKit ${{ needs.tag.outputs.tag }}
          body_path: ${{ steps.changelog.outputs.body_file }}
          files: |
            artifacts/**/*.dmg
            artifacts/**/*Setup*.exe

      - uses: actions/checkout@v5
        with:
          ref: gh-pages

      - name: Update gh-pages download links
        env:
          V: ${{ needs.tag.outputs.version }}
        run: |
          git checkout -B gh-pages origin/gh-pages
          OLD=$(grep -oP 'releases/download/v\K[^/]+' index.html | head -1)
          [ -z "$OLD" ] && { echo "ERROR: no version found in index.html"; exit 1; }
          echo "${OLD} → ${V}"
          sed -i "s|releases/download/v${OLD}|releases/download/v${V}|g" index.html
          sed -i "s|ClaudeKit-${OLD}|ClaudeKit-${V}|g" index.html
          sed -i "s|ClaudeKit.Setup.${OLD}|ClaudeKit.Setup.${V}|g" index.html
          sed -i "s|v${OLD} ·|v${V} ·|g" index.html
          git add index.html
          git diff --cached --quiet || {
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: update download links to ${V}"
            git push origin gh-pages
          }
